name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0. Defaults to package.json."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  mac:
    name: Build Notarized Mac DMG
    runs-on: macos-14
    timeout-minutes: 90
    env:
      BEZGROW_MAC_SIGNING_IDENTITY: ${{ secrets.BEZGROW_MAC_SIGNING_IDENTITY }}
      BEZGROW_MAC_PROVIDER_SHORT_NAME: ${{ secrets.BEZGROW_MAC_PROVIDER_SHORT_NAME }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run desktop:build:mac:public

      - run: |
          mkdir -p release-artifacts
          cp public/downloads/Bezgrow-mac.dmg release-artifacts/Bezgrow-mac.dmg
          cp public/downloads/Bezgrow-mac.dmg.release.json release-artifacts/Bezgrow-mac.dmg.release.json

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release-artifacts/*
          if-no-files-found: error

  windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      BEZGROW_WINDOWS_SIGNED: ${{ secrets.BEZGROW_WINDOWS_SIGNED }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run desktop:build:windows:public

      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Copy-Item public/downloads/Bezgrow-windows.exe release-artifacts/Bezgrow-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish Installers And Download Manifest
    runs-on: ubuntu-latest
    needs:
      - mac
      - windows
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          TAG="v${VERSION#v}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Bezgrow $VERSION" --notes "Bezgrow desktop installers."
          fi
          gh release upload "$TAG" \
            release-artifacts/mac/Bezgrow-mac.dmg \
            release-artifacts/mac/Bezgrow-mac.dmg.release.json \
            release-artifacts/windows/Bezgrow-windows.exe \
            --clobber

      - name: Write download manifest
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          BASE_URL="https://github.com/$REPOSITORY/releases/download/$TAG"
          node scripts/write-desktop-release-manifest.mjs \
            --version "$VERSION" \
            --mac-url "$BASE_URL/Bezgrow-mac.dmg" \
            --mac-file "release-artifacts/mac/Bezgrow-mac.dmg" \
            --mac-notarized true \
            --windows-url "$BASE_URL/Bezgrow-windows.exe" \
            --windows-file "release-artifacts/windows/Bezgrow-windows.exe" \
            --windows-signed "${{ secrets.BEZGROW_WINDOWS_SIGNED }}"

      - name: Commit manifest
        shell: bash
        run: |
          if git diff --quiet -- public/downloads/desktop-release.json; then
            echo "Download manifest already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads/desktop-release.json
          git commit -m "Update desktop download manifest [skip ci]"
          git push
